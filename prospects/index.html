<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Base Prospects – Système Auro</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;background:#0d1117;color:#e6edf3;padding:1.5rem}
h1{color:#58a6ff;margin-bottom:0.3rem;font-size:1.4rem}
.sub{color:#8b949e;font-size:0.82rem;margin-bottom:1.5rem}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:0.8rem;margin-bottom:1.5rem}
.stat{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:1rem;text-align:center}
.stat-big{font-size:1.8rem;font-weight:700;color:#58a6ff}
.stat-txt{font-size:0.7rem;color:#8b949e;text-transform:uppercase;letter-spacing:0.08em}

/* FORMULAIRE AJOUT */
.add-form{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:1.2rem;margin-bottom:1.5rem}
.add-form h2{font-size:0.9rem;color:#f0f6fc;margin-bottom:1rem}
.form-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:0.6rem;margin-bottom:0.8rem}
.form-row input,.form-row select{background:#0d1117;border:1px solid #30363d;border-radius:5px;padding:0.55rem 0.7rem;color:#e6edf3;font-size:0.82rem;font-family:Arial,sans-serif;outline:none}
.form-row input:focus,.form-row select:focus{border-color:#58a6ff}
.btn-add{background:#238636;color:white;border:none;padding:0.6rem 1.2rem;border-radius:5px;font-size:0.85rem;font-weight:700;cursor:pointer}
.btn-add:hover{background:#2ea043}

/* TABLE */
.table-wrap{background:#161b22;border:1px solid #30363d;border-radius:8px;overflow:hidden}
.table-header{display:flex;justify-content:space-between;align-items:center;padding:0.8rem 1rem;border-bottom:1px solid #30363d}
.table-header h2{font-size:0.9rem;color:#f0f6fc}
.search{background:#0d1117;border:1px solid #30363d;border-radius:5px;padding:0.4rem 0.7rem;color:#e6edf3;font-size:0.8rem;width:200px;outline:none}
table{width:100%;border-collapse:collapse}
th{background:#0d1117;padding:0.6rem 0.8rem;text-align:left;font-size:0.68rem;color:#8b949e;text-transform:uppercase;letter-spacing:0.08em;border-bottom:1px solid #30363d}
td{padding:0.6rem 0.8rem;font-size:0.8rem;border-bottom:1px solid #21262d;vertical-align:middle}
tr:hover td{background:#1c2128}
tr:last-child td{border-bottom:none}

/* BADGES */
.badge{display:inline-block;padding:0.2rem 0.55rem;border-radius:10px;font-size:0.65rem;font-weight:700;text-transform:uppercase;letter-spacing:0.05em}
.badge-non{background:#3d1f00;color:#f0883e}
.badge-oui{background:#0f2f0f;color:#56d364}
.badge-contact{background:#0d2149;color:#58a6ff}
.badge-devis{background:#1f1235;color:#bc8cff}
.badge-client{background:#0f2f0f;color:#56d364}

/* ACTIONS */
.btn-action{background:none;border:1px solid #30363d;color:#8b949e;padding:0.25rem 0.5rem;border-radius:4px;font-size:0.7rem;cursor:pointer;margin-right:0.3rem;transition:all 0.2s}
.btn-action:hover{border-color:#58a6ff;color:#58a6ff}
.btn-msg{border-color:#bc8cff;color:#bc8cff}
.btn-msg:hover{background:#1f1235}
.btn-site{border-color:#56d364;color:#56d364}
.btn-site:hover{background:#0f2f0f}

/* MODAL MESSAGE */
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:100;align-items:center;justify-content:center}
.modal.open{display:flex}
.modal-box{background:#161b22;border:1px solid #30363d;border-radius:10px;padding:1.5rem;max-width:550px;width:90%}
.modal-box h3{color:#f0f6fc;margin-bottom:1rem;font-size:1rem}
.modal-box textarea{width:100%;background:#0d1117;border:1px solid #30363d;border-radius:6px;padding:0.8rem;color:#e6edf3;font-size:0.82rem;font-family:Arial,sans-serif;min-height:180px;resize:vertical;outline:none;margin-bottom:0.8rem}
.modal-btns{display:flex;gap:0.6rem;justify-content:flex-end}
.btn-copy-msg{background:#238636;color:white;border:none;padding:0.6rem 1rem;border-radius:5px;font-size:0.82rem;font-weight:700;cursor:pointer}
.btn-close{background:none;border:1px solid #30363d;color:#8b949e;padding:0.6rem 1rem;border-radius:5px;font-size:0.82rem;cursor:pointer}
.copied{color:#56d364;font-size:0.75rem;display:none}
</style>
</head>
<body>

<h1>🎯 Base de prospects</h1>
<p class="sub">Artisans sans site web — à contacter</p>

<div class="stats">
  <div class="stat"><div class="stat-big" id="stat-total">0</div><div class="stat-txt">Total prospects</div></div>
  <div class="stat"><div class="stat-big" id="stat-acontacter">0</div><div class="stat-txt">À contacter</div></div>
  <div class="stat"><div class="stat-big" id="stat-encours">0</div><div class="stat-txt">En cours</div></div>
  <div class="stat"><div class="stat-big" id="stat-clients">0</div><div class="stat-txt">Clients 💰</div></div>
</div>

<div class="add-form">
  <h2>➕ Ajouter un prospect</h2>
  <div class="form-row">
    <input type="text" id="f-nom" placeholder="Nom entreprise *">
    <input type="text" id="f-metier" placeholder="Métier *">
    <input type="text" id="f-ville" placeholder="Ville *">
    <input type="text" id="f-tel" placeholder="Téléphone">
    <input type="text" id="f-email" placeholder="Email">
    <select id="f-site">
      <option value="non">❌ Pas de site</option>
      <option value="mauvais">⚠️ Site mauvais</option>
      <option value="oui">✅ A déjà un site</option>
    </select>
  </div>
  <button class="btn-add" onclick="ajouterProspect()">➕ Ajouter</button>
</div>

<div class="table-wrap">
  <div class="table-header">
    <h2>📋 Liste des prospects</h2>
    <input type="text" class="search" placeholder="🔍 Rechercher..." oninput="filtrer(this.value)">
  </div>
  <table>
    <thead>
      <tr>
        <th>Entreprise</th>
        <th>Métier</th>
        <th>Ville</th>
        <th>Téléphone</th>
        <th>Site web</th>
        <th>Statut</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<!-- MODAL MESSAGE -->
<div class="modal" id="modal">
  <div class="modal-box">
    <h3>💬 Message de prospection</h3>
    <textarea id="modal-msg"></textarea>
    <div class="modal-btns">
      <span class="copied" id="copied">✅ Copié !</span>
      <button class="btn-copy-msg" onclick="copierMsg()">📋 Copier</button>
      <button class="btn-close" onclick="fermerModal()">Fermer</button>
    </div>
  </div>
</div>

<script>
// DONNÉES — sauvegardées dans le navigateur
let prospects = JSON.parse(localStorage.getItem('prospects') || '[]');

const STATUTS = ['À contacter','Contacté','Devis envoyé','Client ✅'];

function sauvegarder() {
  localStorage.setItem('prospects', JSON.stringify(prospects));
  afficher();
  mettreAJourStats();
}

function ajouterProspect() {
  const nom = document.getElementById('f-nom').value.trim();
  const metier = document.getElementById('f-metier').value.trim();
  const ville = document.getElementById('f-ville').value.trim();
  if(!nom || !metier || !ville) { alert('Remplis au moins nom, métier et ville !'); return; }
  
  prospects.unshift({
    id: Date.now(),
    nom,
    metier,
    ville,
    tel: document.getElementById('f-tel').value.trim(),
    email: document.getElementById('f-email').value.trim(),
    site: document.getElementById('f-site').value,
    statut: 0,
    date: new Date().toLocaleDateString('fr-FR')
  });
  
  // Reset form
  ['f-nom','f-metier','f-ville','f-tel','f-email'].forEach(id => document.getElementById(id).value = '');
  sauvegarder();
}

function changerStatut(id) {
  const p = prospects.find(x => x.id === id);
  if(p) { p.statut = (p.statut + 1) % STATUTS.length; sauvegarder(); }
}

function supprimerProspect(id) {
  if(confirm('Supprimer ce prospect ?')) {
    prospects = prospects.filter(x => x.id !== id);
    sauvegarder();
  }
}

function genererMessage(id) {
  const p = prospects.find(x => x.id === id);
  if(!p) return;
  
  const msg = `Bonjour,

Je suis tombé sur votre entreprise ${p.nom} et j'ai remarqué que vous n'aviez pas encore de site web.

En tant que web designer spécialisé dans les artisans, j'ai créé une démo gratuite de ce que pourrait être votre site :

👉 nanda-web-designer.github.io/Systeme-auro/clients/demo-${p.metier.toLowerCase()}/

Ce site inclut :
✅ Vos services mis en valeur
✅ Vos coordonnées cliquables
✅ Un formulaire de contact
✅ Optimisé mobile

Je peux l'adapter à votre image en 48h pour seulement 350€ (site livré, hébergement inclus 1 an).

Intéressé(e) ? Je reste disponible pour en discuter.

Cordialement,
Nanda Web Designer`;

  document.getElementById('modal-msg').value = msg;
  document.getElementById('modal').classList.add('open');
}

function copierMsg() {
  const ta = document.getElementById('modal-msg');
  ta.select();
  document.execCommand('copy');
  document.getElementById('copied').style.display = 'inline';
  setTimeout(() => document.getElementById('copied').style.display = 'none', 2000);
}

function fermerModal() {
  document.getElementById('modal').classList.remove('open');
}

function badgeSite(site) {
  if(site === 'non') return '<span class="badge badge-non">❌ Pas de site</span>';
  if(site === 'mauvais') return '<span class="badge" style="background:#2d2000;color:#e3b341">⚠️ Site mauvais</span>';
  return '<span class="badge badge-oui">✅ A un site</span>';
}

function badgeStatut(s) {
  const styles = ['badge-non','badge-contact','badge-devis','badge-client'];
  return `<span class="badge ${styles[s]}">${STATUTS[s]}</span>`;
}

function afficher(liste) {
  const data = liste || prospects;
  const tbody = document.getElementById('tbody');
  if(data.length === 0) {
    tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:#8b949e;padding:2rem">Aucun prospect — ajoutes-en un !</td></tr>';
    return;
  }
  tbody.innerHTML = data.map(p => `
    <tr>
      <td><strong style="color:#f0f6fc">${p.nom}</strong><br><span style="font-size:0.68rem;color:#8b949e">${p.date}</span></td>
      <td>${p.metier}</td>
      <td>${p.ville}</td>
      <td>${p.tel ? `<a href="tel:${p.tel}" style="color:#58a6ff;text-decoration:none">${p.tel}</a>` : '—'}</td>
      <td>${badgeSite(p.site)}</td>
      <td><span onclick="changerStatut(${p.id})" style="cursor:pointer" title="Cliquer pour changer">${badgeStatut(p.statut)}</span></td>
      <td>
        <button class="btn-action btn-msg" onclick="genererMessage(${p.id})">💬 Message</button>
        <button class="btn-action" onclick="supprimerProspect(${p.id})">🗑️</button>
      </td>
    </tr>
  `).join('');
}

function filtrer(val) {
  const v = val.toLowerCase();
  afficher(prospects.filter(p => 
    p.nom.toLowerCase().includes(v) || 
    p.metier.toLowerCase().includes(v) || 
    p.ville.toLowerCase().includes(v)
  ));
}

function mettreAJourStats() {
  document.getElementById('stat-total').textContent = prospects.length;
  document.getElementById('stat-acontacter').textContent = prospects.filter(p => p.statut === 0).length;
  document.getElementById('stat-enours').textContent = prospects.filter(p => p.statut === 1 || p.statut === 2).length;
  document.getElementById('stat-clients').textContent = prospects.filter(p => p.statut === 3).length;
}

// Init
afficher();
mettreAJourStats();
</script>
</body>
</html>
